[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_rts = 0          ; don't reset ESP32 when the serial monitor closes
monitor_dtr = 0          ; (CP2102 RTS/DTR drive EN/GPIO0 — see debug-lessons §4)
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
