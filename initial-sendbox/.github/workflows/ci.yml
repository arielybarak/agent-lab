# CI workflow for the Agents Playground repository.
#
# Jobs:
#   lint    — Runs Ruff (Python linter/formatter check) on all Python files.
#   test    — Runs pytest on the src/ directory (skips gracefully if no tests exist).
#   agent-validate — Validates that all .agent.md files contain required front-matter
#                    fields and runs the governance-audit hook.
#
# Security notes:
#   - Permissions are set to the minimum required (contents: read).
#   - All actions are pinned to major version tags.
#   - No secrets are used in this workflow.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel any in-progress run for the same PR/branch to save resources.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job: lint
  # Lints Python source files using Ruff — a fast, all-in-one Python linter.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache pip downloads to speed up subsequent runs.
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ruff-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-ruff-

      - name: Install Ruff
        run: pip install ruff==0.4.4

      # Run Ruff in check mode — exits non-zero if any lint errors are found.
      - name: Run Ruff linter
        run: ruff check src/ hooks/ --output-format github

      # Verify formatting without modifying files.
      - name: Run Ruff formatter check
        run: ruff format src/ hooks/ --check

  # ---------------------------------------------------------------------------
  # Job: test
  # Runs pytest. Continues if no test files are found (--ignore-glob pattern).
  # ---------------------------------------------------------------------------
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          # Install project dependencies if a requirements file exists.
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run tests
        # exitcode 5 means "no tests collected" — acceptable for a fresh repo.
        run: |
          pytest src/ --tb=short --no-header -q \
            --cov=src --cov-report=term-missing
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 5 ]; then
            echo "No tests found — skipping."
            exit 0
          fi
          exit $EXIT_CODE

  # ---------------------------------------------------------------------------
  # Job: agent-validate
  # Validates agent definition files and runs the governance-audit hook.
  # ---------------------------------------------------------------------------
  agent-validate:
    name: Validate Agent Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Verify that every .agent.md file has required YAML front-matter fields.
      - name: Check agent front-matter
        run: |
          python3 - <<'EOF'
          import re
          import sys
          from pathlib import Path

          REQUIRED_FIELDS = {"name", "description"}
          errors = []

          for agent_file in Path(".github/agents").rglob("*.agent.md"):
              text = agent_file.read_text(encoding="utf-8")
              # Extract YAML front-matter between the first pair of '---' delimiters.
              match = re.match(r"^---\n(.*?)\n---", text, re.DOTALL)
              if not match:
                  errors.append(f"{agent_file}: missing YAML front-matter")
                  continue
              front_matter = match.group(1)
              for field in REQUIRED_FIELDS:
                  if not re.search(rf"^\s*{field}\s*:", front_matter, re.MULTILINE):
                      errors.append(f"{agent_file}: missing required field '{field}'")

          if errors:
              print("Agent validation FAILED:")
              for e in errors:
                  print(f"  ✗ {e}")
              sys.exit(1)
          else:
              print(f"Agent validation PASSED ({len(list(Path('.github/agents').rglob('*.agent.md')))} files checked)")
          EOF

      # Run the governance-audit hook against all agent files.
      - name: Run governance audit
        run: |
          python hooks/governance-audit \
            --path .github/agents \
            --output /tmp/audit.jsonl \
            --fail-on critical

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-audit-report
          path: /tmp/audit.jsonl
          retention-days: 7
