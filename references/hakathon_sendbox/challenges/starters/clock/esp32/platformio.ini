[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_rts = 0          ; don't reset ESP32 when the serial monitor closes (debug-lessons §4)
monitor_dtr = 0
; shared brick headers (wifi_ntp.h, uart_fpga.h, pin_config.h)
build_flags = -I ../../../../projects/common/esp32
