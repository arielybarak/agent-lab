[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
monitor_rts = 0          ; don't reset ESP32 when the serial monitor closes (debug-lessons §4)
monitor_dtr = 0

; NTP time fetch -- no extra libs needed (WiFi + time.h are built-in)
; Upload port auto-detected; uncomment if needed:
; upload_port = COM4
; monitor_port = COM4
